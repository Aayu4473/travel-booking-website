<!DOCTYPE html>
<html>
<head>
  <title>Payment | Wanderlust</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">✈ ExploreGlobe</div>
</header>

<section class="payment-bg">
  <div class="payment-wrapper">

  <div class="payment-card">
    <h2>Payment</h2>
    <p id="payAmount"></p>

    <input placeholder="Card Number">
    <input placeholder="Expiry Date">
    <input placeholder="CVV">

    <button class="primary-btn" onclick="confirmPayment()">Pay Now</button>
  </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
